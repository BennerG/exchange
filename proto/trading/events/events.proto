syntax = "proto3";

package trading.events;

option go_package = "github.com/BennerG/exchange/internal/gen/trading/events";

import "google/protobuf/timestamp.proto";

message Money {
  int64 amount_cents = 1;
  string currency = 2;
}

message OrderSubmitted {
  string order_id = 1;
  string user_id = 2;
  int64 quantity = 3;
  Money price_per_share = 4;
  OrderSide side = 5;
  google.protobuf.Timestamp submitted_at = 6;
}

message Filled {
  string trade_id = 1;               // unique per match, the idempotency key
  string buy_order_id = 2;
  string sell_order_id = 3;
  string buyer_user_id = 4;
  string seller_user_id = 5;
  int64 quantity = 6;
  Money price = 7;
  int64 buy_order_remaining = 8;     // buy order's remaining quantity after this fill
  int64 sell_order_remaining = 9;    // sell order's remaining quantity after this fill
  google.protobuf.Timestamp filled_at = 10;
}

message Rejected {
  string order_id = 1;
  RejectionReason reason = 2;
  string message = 3;
  google.protobuf.Timestamp rejected_at = 4;
}

message OrderCancelled {
  string order_id = 1;
  string user_id = 2;
  int64 cancelled_quantity = 3;
  google.protobuf.Timestamp cancelled_at = 4;
}

message Event {
  oneof payload {
    OrderSubmitted order_submitted = 1;
    Filled filled = 2;
    Rejected rejected = 3;
    OrderCancelled order_cancelled = 4;
  }
}

enum OrderSide {
  BUY = 0;
  SELL = 1;
}

enum RejectionReason {
  INSUFFICIENT_FUNDS = 0;
  INSUFFICIENT_SHARES = 1;
  INVALID_PRICE = 2;
  ORDER_BOOK_ERROR = 3;
  INTERNAL_ERROR = 4;
  CANCELLED_BY_USER = 5;
}
